<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能客服</title>
  <style>
    .chat-widget { position: fixed; bottom: 20px; right: 20px; z-index: 9999; font-family: -apple-system, sans-serif; }
    .chat-button { width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, #007AFF, #5856D6); box-shadow: 0 4px 20px rgba(0,122,255,0.4); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 28px; color: white; }
    .chat-window { position: absolute; bottom: 80px; right: 0; width: 380px; height: 500px; background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); border-radius: 20px; box-shadow: 0 8px 40px rgba(0,0,0,0.15); display: none; flex-direction: column; overflow: hidden; }
    .chat-window.open { display: flex; }
    .chat-header { padding: 16px 20px; background: linear-gradient(135deg, #007AFF, #5856D6); color: white; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .message { max-width: 80%; display: flex; gap: 8px; }
    .message.user { flex-direction: row-reverse; }
    .message-avatar { width: 32px; height: 32px; border-radius: 50%; background: #007AFF; color: white; display: flex; align-items: center; justify-content: center; font-size: 14px; }
    .message.user .message-avatar { background: #34C759; }
    .message-content { background: rgba(0,0,0,0.05); padding: 12px 16px; border-radius: 16px; font-size: 14px; }
    .message.user .message-content { background: #007AFF; color: white; }
    .chat-input { padding: 16px; border-top: 1px solid rgba(0,0,0,0.1); display: flex; gap: 12px; }
    .chat-input input { flex: 1; padding: 12px 16px; border: 1px solid #ddd; border-radius: 24px; outline: none; }
    .chat-input button { width: 44px; height: 44px; border-radius: 50%; border: none; background: #007AFF; color: white; cursor: pointer; }
  </style>
</head>
<body>
  <div class="chat-widget">
    <div class="chat-window" id="chatWindow">
      <div class="chat-header">
        <h3>🤖 智能客服</h3>
      </div>
      <div class="chat-messages" id="chatMessages">
        <div class="message">
          <div class="message-avatar">🤖</div>
          <div class="message-content">您好！我是智能客服，请问有什么可以帮您？</div>
        </div>
      </div>
      <div class="chat-input">
        <input type="text" id="messageInput" placeholder="请输入您的问题...">
        <button onclick="sendMessage()">➤</button>
      </div>
    </div>
    <div class="chat-button" onclick="toggleChat()">💬</div>
  </div>
  <script>
    let isOpen = false;
    function toggleChat() { isOpen = !isOpen; document.getElementById('chatWindow').classList.toggle('open', isOpen); }
    async function sendMessage() {
      const input = document.getElementById('messageInput');
      const message = input.value.trim();
      if (!message) return;
      addMessage(message, 'user');
      input.value = '';
      showTyping();
      // TODO: 调用真实 API
      setTimeout(() => { removeTyping(); addMessage('感谢您的消息，我会努力学习为您服务！', 'assistant'); }, 1000);
    }
    function addMessage(content, role) {
      const div = document.createElement('div');
      div.className = 'message ' + role;
      div.innerHTML = '<div class="message-avatar">' + (role === 'user' ? '👤' : '🤖') + '</div><div class="message-content">' + content + '</div>';
      document.getElementById('chatMessages').appendChild(div);
    }
    function showTyping() { document.getElementById('chatMessages').innerHTML += '<div id="typing">正在输入...</div>'; }
    function removeTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }
  </script>
</body>
</html>
