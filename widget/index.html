<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能客服</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    .chat-widget {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 9999;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    
    .chat-button {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: linear-gradient(135deg, #007AFF, #5856D6);
      box-shadow: 0 4px 20px rgba(0,122,255,0.4);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      transition: transform 0.3s ease;
    }
    
    .chat-button:hover {
      transform: scale(1.1);
    }
    
    .chat-window {
      position: absolute;
      bottom: 80px;
      right: 0;
      width: 380px;
      height: 500px;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.15);
      display: none;
      flex-direction: column;
      overflow: hidden;
    }
    
    .chat-window.open {
      display: flex;
    }
    
    .chat-header {
      padding: 16px 20px;
      background: linear-gradient(135deg, #007AFF, #5856D6);
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .chat-header h3 {
      font-size: 16px;
      font-weight: 600;
    }
    
    .chat-header .status {
      font-size: 12px;
      opacity: 0.9;
    }
    
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .message {
      max-width: 80%;
      display: flex;
      gap: 8px;
    }
    
    .message.user {
      flex-direction: row-reverse;
    }
    
    .message-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #007AFF;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }
    
    .message.user .message-avatar {
      background: #34C759;
    }
    
    .message-content {
      background: rgba(0,0,0,0.05);
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
    }
    
    .message.user .message-content {
      background: #007AFF;
      color: white;
    }
    
    .message-time {
      font-size: 11px;
      color: #999;
      margin-top: 4px;
    }
    
    .message.user .message-time {
      text-align: right;
    }
    
    .chat-input {
      padding: 16px;
      border-top: 1px solid rgba(0,0,0,0.1);
      display: flex;
      gap: 12px;
    }
    
    .chat-input input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #ddd;
      border-radius: 24px;
      outline: none;
      font-size: 14px;
    }
    
    .chat-input input:focus {
      border-color: #007AFF;
    }
    
    .chat-input button {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: #007AFF;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    
    .chat-input button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    
    .typing {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 8px 12px;
      background: rgba(0,0,0,0.05);
      border-radius: 16px;
      width: fit-content;
    }
    
    .typing span {
      width: 8px;
      height: 8px;
      background: #999;
      border-radius: 50%;
      animation: typing 1.4s infinite;
    }
    
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    
    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-4px); }
    }
  </style>
</head>
<body>
  <div class="chat-widget">
    <div class="chat-window" id="chatWindow">
      <div class="chat-header">
        <div>
          <h3>🤖 智能客服</h3>
          <div class="status">在线</div>
        </div>
        <button onclick="toggleChat()" style="background:none;border:none;color:white;font-size:20px;cursor:pointer;">✕</button>
      </div>
      <div class="chat-messages" id="chatMessages">
        <div class="message">
          <div class="message-avatar">🤖</div>
          <div>
            <div class="message-content">您好！我是智能客服，请问有什么可以帮您？</div>
            <div class="message-time">刚刚</div>
          </div>
        </div>
      </div>
      <div class="chat-input">
        <input type="text" id="messageInput" placeholder="请输入您的问题..." onkeypress="handleKeyPress(event)">
        <button id="sendButton" onclick="sendMessage()">➤</button>
      </div>
    </div>
    <div class="chat-button" onclick="toggleChat()">💬</div>
  </div>

  <script>
    let isOpen = false;
    let appId = null;
    
    // 初始化
    window.addEventListener('DOMContentLoaded', () => {
      // 从 URL 获取 appId
      const urlParams = new URLSearchParams(window.location.search);
      appId = urlParams.get('appId') || localStorage.getItem('chat_appId') || 'demo';
      
      // 加载历史记录
      loadHistory();
    });
    
    function toggleChat() {
      isOpen = !isOpen;
      document.getElementById('chatWindow').classList.toggle('open', isOpen);
    }
    
    function handleKeyPress(event) {
      if (event.key === 'Enter') {
        sendMessage();
      }
    }
    
    async function sendMessage() {
      const input = document.getElementById('messageInput');
      const button = document.getElementById('sendButton');
      const message = input.value.trim();
      
      if (!message) return;
      
      // 禁用输入
      input.disabled = true;
      button.disabled = true;
      
      // 添加用户消息
      addMessage(message, 'user');
      input.value = '';
      
      // 显示正在输入
      showTyping();
      
      try {
        // 调用 API
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            message: message,
            appId: appId,
            channel: 'web'
          })
        });
        
        const data = await response.json();
        
        // 移除正在输入
        removeTyping();
        
        // 添加 AI 回复
        if (data.code === 0) {
          addMessage(data.data.reply, 'assistant');
        } else {
          addMessage('抱歉，我现在比较忙，请稍后再试。', 'assistant');
        }
      } catch (error) {
        removeTyping();
        addMessage('网络错误，请检查网络后重试。', 'assistant');
      }
      
      // 启用输入
      input.disabled = false;
      button.disabled = false;
      input.focus();
      
      // 保存历史
      saveHistory();
    }
    
    function addMessage(content, role) {
      const messages = document.getElementById('chatMessages');
      const div = document.createElement('div');
      div.className = `message ${role}`;
      div.innerHTML = `
        <div class="message-avatar">${role === 'user' ? '👤' : '🤖'}</div>
        <div>
          <div class="message-content">${escapeHtml(content)}</div>
          <div class="message-time">${new Date().toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'})}</div>
        </div>
      `;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }
    
    function showTyping() {
      const messages = document.getElementById('chatMessages');
      const div = document.createElement('div');
      div.className = 'message';
      div.id = 'typing';
      div.innerHTML = `
        <div class="message-avatar">🤖</div>
        <div class="typing">
          <span></span>
          <span></span>
          <span></span>
        </div>
      `;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }
    
    function removeTyping() {
      const typing = document.getElementById('typing');
      if (typing) typing.remove();
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    function saveHistory() {
      const messages = document.getElementById('chatMessages').innerHTML;
      localStorage.setItem('chat_history_' + appId, messages);
    }
    
    function loadHistory() {
      const history = localStorage.getItem('chat_history_' + appId);
      if (history) {
        document.getElementById('chatMessages').innerHTML = history;
      }
    }
  </script>
</body>
</html>
